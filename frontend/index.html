<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Concurrent Audit Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>AI Concurrent Audit Report Generator</h1>

    <div class="card">

        <input type="file" id="reportFile">

        <input type="date" id="startDate">

        <input type="date" id="endDate">

        <button onclick="generateReport()">
            Generate Report
        </button>

        <div id="status"></div>

        <a id="downloadBtn" style="display:none">
            Download Report
        </a>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
