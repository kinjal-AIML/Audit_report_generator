<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %} Audit Report Generator {% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard/plugins/fontawesome-free/css/all.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard/plugins/overlayScrollbars/css/OverlayScrollbars.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/adminlte.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/detection-info.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --sidebar-bg: #1e272e;
      --accent-blue: #3498db;
      --nav-header-bg: #ffffff;
    }

    .main-sidebar { background-color: var(--sidebar-bg) !important; }
    
    .nav-header-title {
      font-weight: 700;
      color: #2d3436;
      font-size: 1.2rem;
      letter-spacing: 0.5px;
    }

    .brand-link {
      border-bottom: 1px solid #4b545c;
      padding: 0.8125rem 0.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fff; /* Contrast for logo visibility */
    }

    .nav-sidebar .nav-item .nav-link.active {
      background-color: var(--accent-blue) !important;
      color: white !important;
    }

    .content-wrapper { background-color: #f4f6f9; }
    
    /* Smooth transition for sidebar logos */
    .brand-image { transition: opacity 0.3s ease; }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand navbar-white navbar-light border-bottom-0 shadow-sm">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button" aria-label="Toggle sidebar">
          <i class="fas fa-bars"></i>
        </a>
        <!-- <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a> -->
      </li>
    </ul>

    <div class="mx-auto order-0">
        <span class="nav-header-title">AUDIT REPORT GENERATOR</span>
    </div>

    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <a class="nav-link text-danger" href="#" role="button">
          <i class="fas fa-power-off mr-1"></i> <span class="d-none d-sm-inline">Logout</span>
        </a>
      </li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="/" class="brand-link">
      <img src="{{ url_for('static', filename='projectimage/foresightdigital.png') }}" 
           alt="Logo" class="brand-image" style="max-height: 40px; width: auto;">
    </a>

    <div class="sidebar">

      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column nav-child-indent" data-widget="treeview" role="menu">
        </ul>
      </nav>
    </div>
    <div class="sidebar-footer">
      <div class="float-right d-none d-sm-inline">v1.0.4</div>
      <strong>&copy; 2026 <a href="https://www.foresightdigital.tech">Foresight Digital</a>.</strong>
    </div>
  </aside>

  <div class="content-wrapper">

    
    <section class="content">
      <div class="container-fluid">
        <div class="row">


        </div>

        {% block content %}{% endblock %}
      </div>
    </section>
  </div>

  <footer class="main-footer">
    <div class="float-right d-none d-sm-inline">v1.0.4</div>
    <strong>&copy; 2026 <a href="https://www.foresightdigital.tech">Foresight Digital</a>.</strong>
  </footer>
</div>

<script src="/static/dashboard/plugins/jquery/jquery.min.js"></script>
  <script src="/static/dashboard/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/static/dashboard/plugins/overlayScrollbars/js/jquery.overlayScrollbars.min.js"></script>
  <script src="/static/dashboard/dist/js/adminlte.min.js"></script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
